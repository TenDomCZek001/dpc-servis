<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPC Servis | Hardwarový & Softwarový servis</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        body {
            background-color: #ffffff;
            color: #000000;
            line-height: 1.4;
        }

        /* Navigace přesně podle vašeho snímku obrazovky */
        nav {
            background-color: #ffffff;
            padding: 24px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-box {
            border: 3px solid #000000;
            padding: 8px 24px;
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
        }
        .nav-link {
            background: none;
            border: none;
            color: #000000;
            font-weight: 700;
            font-size: 15px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-action {
            background-color: #2563eb;
            color: #ffffff;
            border: 3px solid #000000;
            padding: 12px 28px;
            font-weight: 800;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 4px 4px 0px #000000;
            cursor: pointer;
            text-transform: uppercase;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-action:hover {
            transform: translate(-1px, -1px);
            box-shadow: 5px 5px 0px #000000;
        }
        .btn-action:active {
            transform: translate(3px, 3px);
            box-shadow: 1px 1px 0px #000000;
        }

        /* Hlavní Hero sekce webu */
        .hero {
            max-width: 1200px;
            margin: 0 auto;
            padding: 120px 80px;
        }
        .hero h1 {
            font-size: 68px;
            font-weight: 900;
            line-height: 1.05;
            text-transform: uppercase;
            margin-bottom: 35px;
            letter-spacing: -1.5px;
        }
        .hero h1 span {
            background-color: #2563eb;
            color: #ffffff;
            padding: 2px 16px;
            display: inline-block;
            margin-top: 5px;
        }
        .hero p {
            color: #374151;
            font-size: 19px;
            font-weight: 500;
            max-width: 580px;
            line-height: 1.6;
        }

        /* Vyskakovací formulář (Modal) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(2px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
            z-index: 999;
            padding: 20px;
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-card {
            background-color: #ffffff;
            border: 3px solid #000000;
            padding: 40px;
            width: 100%;
            max-width: 460px;
            position: relative;
            box-shadow: 8px 8px 0px #000000;
        }
        .modal-close {
            position: absolute;
            top: 15px; right: 20px;
            background: none; border: none;
            color: #000000; font-size: 32px; cursor: pointer;
            font-weight: 800;
        }
        .modal-card h3 {
            font-size: 26px;
            font-weight: 950;
            text-transform: uppercase;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            text-transform: uppercase;
            color: #000000;
            margin-bottom: 6px;
            font-weight: 800;
            letter-spacing: 0.5px;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            background-color: #ffffff;
            border: 3px solid #000000;
            padding: 12px;
            color: #000000;
            font-size: 15px;
            font-weight: 600;
        }
        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            background-color: #f3f4f6;
        }
        
        .btn-send {
            width: 100%;
            background-color: #000000;
            color: #ffffff;
            border: none;
            padding: 16px;
            font-weight: 800;
            text-transform: uppercase;
            font-size: 14px;
            letter-spacing: 1px;
            cursor: pointer;
        }
        .btn-send:hover {
            background-color: #2563eb;
        }
        .btn-send:disabled {
            background-color: #9ca3af;
            cursor: not-allowed;
        }
        
        /* Čisté stavové hlášky */
        .status-box {
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            margin-bottom: 20px;
            border: 3px solid #000000;
            display: none;
        }
        .status-box.success {
            display: block;
            background-color: #bbf7d0;
            color: #166534;
        }
        .status-box.error {
            display: block;
            background-color: #fecaca;
            color: #991b1b;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-box">DPC // SERVIS</div>
        <div class="nav-links">
            <button class="nav-link">Domů</button>
            <button class="nav-link">Služby & Ceník</button>
            <button class="nav-link" onclick="openPopup()">Kontakt</button>
            <button class="btn-action" onclick="openPopup()">VYŘEŠIT PROBLÉM</button>
        </div>
    </nav>

    <header class="hero">
        <h1>Vracím počítačům<br><span>původní sílu.</span></h1>
        <p>Profesionální diagnostika, bleskový upgrade a nekompromisní čištění hardwaru. Žáda korporátní omáčka, prostě opravené PC.</p>
    </header>

    <div id="popupOverlay" class="modal-overlay">
        <div class="modal-card">
            <button class="modal-close" onclick="closePopup()">&times;</button>
            <h3>Nová zakázka</h3>
            
            <div id="dbStatus" class="status-box"></div>

            <form id="orderForm" onsubmit="sendToSupabase(event)">
                <div class="form-group">
                    <label>Vaše jméno</label>
                    <input type="text" id="jmenoInput" required placeholder="Ing. Dominik...">
                </div>
                <div class="form-group">
                    <label>Kontakt (Telefon / E-mail)</label>
                    <input type="text" id="kontaktInput" required placeholder="Kam vám mám zavolat / napsat?">
                </div>
                <div class="form-group">
                    <label>Popis problému s počítačem</label>
                    <textarea id="zavadaInput" rows="4" required placeholder="Co přesně počítač dělá nebo potřebuje?"></textarea>
                </div>
                <button type="submit" id="submitBtn" class="btn-send">Odeslat do systému</button>
            </form>
        </div>
    </div>

    <script>
        // Vaše přesné a vygenerované API klíče ze Supabase
        const SUPABASE_URL = "https://qneewzmyvwvfktpzrvrd.supabase.co";
        const SUPABASE_KEY = "sb_publishable_pJ8fne2TdHw0y1lKCID-cA_gx7JOZDm";

        // Inicializace spojení
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const overlay = document.getElementById('popupOverlay');
        const form = document.getElementById('orderForm');
        const submitBtn = document.getElementById('submitBtn');
        const statusBox = document.getElementById('dbStatus');

        // Funkce pro otevření okna
        function openPopup() {
            overlay.classList.add('active');
            statusBox.className = "status-box";
            form.style.display = "block";
        }

        // Funkce pro zavření okna
        function closePopup() {
            overlay.classList.remove('active');
        }

        // Zavření kliknutím mimo kartu formuláře
        window.addEventListener('click', function(e) {
            if (e.target === overlay) closePopup();
        });

        // Odesílání zakázky přímo do PostgreSQL tabulky
        async function sendToSupabase(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            submitBtn.innerText = "UKLÁDÁM DO SYSTÉMU...";

            const jmeno = document.getElementById('jmenoInput').value;
            const kontakt = document.getElementById('kontaktInput').value;
            const zavada = document.getElementById('zavadaInput').value;

            try {
                // Zápis řádku do Supabase tabulky 'objednavky'
                const { data, error } = await _supabase
                    .from('objednavky')
                    .insert([
                        { jmeno: jmeno, kontakt: kontakt, zavada: zavada }
                    ]);

                if (error) throw error;

                // Zobrazení úspěchu v brutálním stylu
                statusBox.innerText = "✓ OBJEDNÁVKA BYLA ZAPŮJČENA DO DATABÁZE.";
                statusBox.className = "status-box success";
                form.reset();
                form.style.display = "none";

                // Automatické schování celého okna po úspěchu
                setTimeout(closePopup, 3000);

            } catch (error) {
                console.error(error);
                statusBox.innerText = "❌ CHYBA UKLÁDÁNÍ: " + error.message;
                statusBox.className = "status-box error";
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerText = "Odeslat do systému";
            }
        }
    </script>
</body>
</html>
