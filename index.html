<html lang="cs">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DPC Servis | Hardwarový & Softwarový servis</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #ffffff;
            color: #1a1a1a;
            line-height: 1.5;
        }
        
        /* Navigace přesně podle vašeho obrázku */
        nav {
            background-color: #ffffff;
            border-bottom: 1px solid #e5e7eb;
            padding: 20px 80px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .logo-box {
            border: 3px solid #000000;
            padding: 8px 20px;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 1px;
            color: #000000;
        }
        .nav-links {
            display: flex;
            align-items: center;
            gap: 30px;
        }
        .nav-links button {
            background: none;
            border: none;
            color: #000000;
            font-weight: 700;
            font-size: 14px;
            cursor: pointer;
        }
        .btn-header {
            background-color: #2563eb;
            color: #ffffff !important;
            border: 3px solid #000000 !important;
            padding: 10px 24px;
            font-weight: 800 !important;
            font-size: 14px;
            letter-spacing: 0.5px;
            box-shadow: 3px 3px 0px #000000;
            cursor: pointer;
            transition: transform 0.1s, box-shadow 0.1s;
        }
        .btn-header:hover {
            transform: translate(-1px, -1px);
            box-shadow: 4px 4px 0px #000000;
        }
        .btn-header:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px #000000;
        }

            max-width: 1100px;
            margin: 0 auto;
            padding: 100px 80px;

            color: #ffffff;
            padding: 0px 15px;
            display: inline-block;
